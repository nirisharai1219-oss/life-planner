<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routine Tracker</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3c9d0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:380px;
height:600px;
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
}

.nav{
display:flex;
justify-content:space-around;
margin-bottom:10px;
}

.nav button{
border:none;
background:#ff6b9a;
color:white;
padding:8px 15px;
border-radius:15px;
cursor:pointer;
}

.page{
flex:1;
overflow:auto;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
margin:10px 0;
}

.left{
display:flex;
align-items:center;
flex:1;
}

.heart{
font-size:20px;
cursor:pointer;
margin-right:10px;
}

input{
border:none;
border-bottom:1px solid #ccc;
outline:none;
width:100%;
}

.delete{
cursor:pointer;
color:red;
margin-left:10px;
}

.addBtn{
margin-top:10px;
background:#ff6b9a;
color:white;
border:none;
padding:10px;
border-radius:20px;
cursor:pointer;
}

.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

<div class="nav">
<button onclick="showPage('routine')">Routine</button>
<button onclick="showPage('tracker')">Tracker</button>
</div>

<div id="routine" class="page"></div>
<div id="tracker" class="page" style="display:none"></div>

<button class="addBtn" onclick="addTask()">+ Add Routine</button>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("routineTasks")) || []

function save(){
localStorage.setItem("routineTasks",JSON.stringify(tasks))
}

function showPage(p){

document.getElementById("routine").style.display="none"
document.getElementById("tracker").style.display="none"

document.getElementById(p).style.display="block"

if(p==="tracker"){
renderTracker()
}

}

function checkNewDay(){

let today=new Date().toDateString()

tasks.forEach(t=>{

if(t.lastCheck!==today){
t.done=false
}

})

}

function renderRoutine(){

checkNewDay()

let page=document.getElementById("routine")

page.innerHTML=""

tasks.forEach((t,i)=>{

let div=document.createElement("div")

div.className="task"

div.innerHTML=`

<div class="left">

<span class="heart" onclick="toggle(${i})">
${t.done ? "❤️":"🤍"}
</span>

<input value="${t.text}" onchange="editTask(${i},this.value)">

</div>

<span class="delete" onclick="deleteTask(${i})">❌</span>

`

page.appendChild(div)

})

save()

}

function toggle(i){

let today=new Date().toDateString()

let t=tasks[i]

if(!t.history){
t.history=[]
}

t.done=!t.done

if(t.done){

if(!t.history.includes(today)){
t.history.push(today)
}

t.lastCheck=today

}

renderRoutine()

}

function addTask(){

tasks.push({
text:"New Routine",
done:false,
history:[],
lastCheck:null
})

renderRoutine()

}

function editTask(i,v){
tasks[i].text=v
save()
}

function deleteTask(i){

tasks.splice(i,1)

renderRoutine()

}

function renderTracker(){

let page=document.getElementById("tracker")

page.innerHTML=""

tasks.forEach(t=>{

let days=t.history ? t.history.length : 0

let div=document.createElement("div")

div.className="item"

div.innerHTML=`
<span>${t.text}</span>
<span>${days} days</span>
`

page.appendChild(div)

})

}

renderRoutine()

</script>
</script>
