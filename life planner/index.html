</div>

<div class="center">

<h2>💖 Hi Neha 👋</h2>

<div class="date" id="date"></div>

<div class="quote" id="quote"></div>

<div class="moodTitle">How do you feel today?</div>

<div class="moods">

<div class="mood" onclick="selectMood(this)">😞</div>
<div class="mood" onclick="selectMood(this)">😐</div>
<div class="mood" onclick="selectMood(this)">🙂</div>
<div class="mood" onclick="selectMood(this)">😊</div>
<div class="mood" onclick="selectMood(this)">🤩</div>

</div>

</div>

</div>

<script>

let quotes = [

"Small steps still move you forward 🌱",
"You are stronger than you think 💪",
"Progress is progress no matter how small 🌸",
"Take a deep breath and keep going 🌼",
"Every day is a fresh start 🌞"

]

function setDate(){

let today = new Date()

let options = { weekday:'long', year:'numeric', month:'long', day:'numeric' }

document.getElementById("date").innerText = today.toLocaleDateString("en-US",options)

}

function setQuote(){

let random = Math.floor(Math.random()*quotes.length)

document.getElementById("quote").innerText = quotes[random]

}

function selectMood(el){

document.querySelectorAll(".mood").forEach(m=>m.classList.remove("selected"))

el.classList.add("selected")

localStorage.setItem("mood",el.innerText)

}

function loadMood(){

let saved = localStorage.getItem("mood")

if(!saved) return

document.querySelectorAll(".mood").forEach(m=>{

if(m.innerText===saved) m.classList.add("selected")

})

}

setDate()
setQuote()
loadMood()

</script>
