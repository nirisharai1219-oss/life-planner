<title>Journal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e6b6bf;
}

.container{
width:700px;
margin:auto;
padding:40px;
}

h2{
margin-bottom:20px;
}

.newBtn{
background:#e23a84;
color:white;
border:none;
padding:14px;
width:100%;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin-bottom:20px;
}

.card{
background:#f2f2f2;
padding:20px;
border-radius:15px;
margin-top:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
position:relative;
}

.date{
font-size:12px;
color:#666;
margin-top:10px;
}

.kebab{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

.menu{
display:none;
position:absolute;
top:35px;
right:10px;
background:white;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
overflow:hidden;
}

.menu button{
display:block;
width:100%;
border:none;
background:none;
padding:10px 20px;
cursor:pointer;
}

.menu button:hover{
background:#eee;
}

.editor{
display:none;
}

input{
width:100%;
border:none;
border-bottom:1px solid #aaa;
font-size:20px;
padding:10px 0;
background:transparent;
}

textarea{
width:100%;
height:200px;
border:none;
background:#f2f2f2;
border-radius:15px;
padding:15px;
margin-top:15px;
font-size:15px;
}

.saveBtn{
margin-top:15px;
padding:10px 20px;
background:#e23a84;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.closeBtn{
margin-left:10px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div id="listPage">

<h2>Journal</h2>

<button class="newBtn" onclick="openEditor()">+ New Entry</button>

<div id="entryList"></div>

</div>

<div id="editorPage" class="editor">

<h2>Journal</h2>

<div id="date"></div>

<input id="titleInput" placeholder="Title...">

<textarea id="journalText"></textarea>

<br>

<button class="saveBtn" onclick="saveEntry()">Save</button> <button class="closeBtn" onclick="closeEditor()">Close</button>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("journalEntries")) || []
let editIndex = null

function openEditor(index=null){

document.getElementById("listPage").style.display="none"
document.getElementById("editorPage").style.display="block"

document.getElementById("date").innerText = new Date().toDateString()

if(index!==null){

editIndex=index
document.getElementById("titleInput").value=entries[index].title
document.getElementById("journalText").value=entries[index].text

}else{

editIndex=null
document.getElementById("titleInput").value=""
document.getElementById("journalText").value=""

}

}

function closeEditor(){

document.getElementById("editorPage").style.display="none"
document.getElementById("listPage").style.display="block"

}

function saveEntry(){

let title=document.getElementById("titleInput").value
let text=document.getElementById("journalText").value
let date=new Date().toDateString()

if(title==="") return

if(editIndex===null){

entries.push({title,text,date})

}else{

entries[editIndex]={title,text,date}

}

localStorage.setItem("journalEntries",JSON.stringify(entries))

closeEditor()

renderEntries()

}

function deleteEntry(index){

entries.splice(index,1)

localStorage.setItem("journalEntries",JSON.stringify(entries))

renderEntries()

}

function toggleMenu(i){

let menu=document.getElementById("menu"+i)

menu.style.display = menu.style.display==="block" ? "none" : "block"

}

function renderEntries(){

let list=document.getElementById("entryList")

list.innerHTML=""

entries.forEach((e,i)=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<div class="kebab" onclick="toggleMenu(${i})">⋮</div>

<div id="menu${i}" class="menu">

<button onclick="openEditor(${i})">Edit</button>

<button onclick="deleteEntry(${i})">Delete</button>

</div>

<h3>${e.title}</h3>

<p>${e.text.substring(0,100)}...</p>

<div class="date">${e.date}</div>

`

list.appendChild(div)

})

}

renderEntries()

</script>
</script>
