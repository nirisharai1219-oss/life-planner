<style>

body{
background:#e23a84;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#efe5e5;
width:360px;
padding:30px;
border-radius:40px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
color:#e23a84;
font-family:cursive;
}

.bow{
font-size:22px;
margin-bottom:20px;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
margin:12px 0;
border-bottom:1px solid #d7a5a5;
padding-bottom:6px;
}

.heart{
margin-right:8px;
}

.task span{
flex:1;
text-align:left;
outline:none;
}

.delete{
color:#ff4d6d;
cursor:pointer;
font-size:20px;
}

.addBtn{
margin-top:25px;
background:#e23a84;
color:white;
border:none;
padding:12px;
border-radius:25px;
font-size:16px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<h1>To-Do List</h1>

<div class="bow">🎀</div>

<div id="taskList"></div>

<button class="addBtn" onclick="addTask()">+ Add To-Do</button>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function renderTasks(){

let list=document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((task,index)=>{

let div=document.createElement("div")
div.className="task"

div.innerHTML=`
<div class="heart">💞</div>
<span contenteditable="true">${task}</span>
<div class="delete">✖</div>
`

div.querySelector(".delete").onclick=function(){
tasks.splice(index,1)
saveTasks()
renderTasks()
}

div.querySelector("span").oninput=function(){
tasks[index]=this.innerText
saveTasks()
}

list.appendChild(div)

})

}

function addTask(){

let text=prompt("Enter your task")

if(!text) return

tasks.push(text)

saveTasks()
renderTasks()

}

renderTasks()


</script>
